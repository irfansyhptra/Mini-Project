<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Eventify</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/login.css">
    <link rel="stylesheet" href="../assets/libs/fontawesome/css/all.min.css">
</head>

<body>
    <div class="login-container">
        <div class="login-form-wrapper">
            <div class="login-header">
                <a href="../index.html" class="logo">Eventify</a>
                <h1>Masuk ke Akun Anda</h1>
            </div>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                    <span class="toggle-password"><i class="far fa-eye"></i></span>
                </div>
                <div class="form-check">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Ingat saya</label>
                    <a href="#" class="forgot-password">Lupa password?</a>
                </div>
                <button type="submit" class="btn-login">Masuk</button>
            </form>
            <div class="login-footer">
                <p>Belum punya akun? <a href="register.html">Daftar sekarang</a></p>
                <p>Atau masuk dengan</p>
                <div class="social-login">
                    <button class="btn-social google"><i class="fab fa-google"></i> Google</button>
                    <button class="btn-social facebook"><i class="fab fa-facebook-f"></i> Facebook</button>
                </div>
            </div>
        </div>
        <div class="login-image">
            <img src="../assets/img/backgrounds/login-bg.jpg" alt="Login Background">
        </div>
    </div>

    <script src="../assets/js/auth.js"></script>
</body>

</html>
