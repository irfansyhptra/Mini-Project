<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Eventify</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/register.css">
    <link rel="stylesheet" href="../assets/libs/fontawesome/css/all.min.css">
</head>

<body>
    <div class="register-container">
        <div class="register-form-wrapper">
            <div class="register-header">
                <a href="../index.html" class="logo">Eventify</a>
                <h1>Buat Akun Baru</h1>
            </div>
            <form id="registerForm" class="register-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">Nama Depan</label>
                        <input type="text" id="firstName" name="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Nama Belakang</label>
                        <input type="text" id="lastName" name="lastName" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                    <span class="toggle-password"><i class="far fa-eye"></i></span>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Konfirmasi Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                    <span class="toggle-password"><i class="far fa-eye"></i></span>
                </div>
                <div class="form-check">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">Saya menyetujui <a href="#">Syarat dan Ketentuan</a> serta <a href="#">Kebijakan
                            Privasi</a></label>
                </div>
                <button type="submit" class="btn-register">Daftar</button>
            </form>
            <div class="register-footer">
                <p>Sudah punya akun? <a href="login.html">Masuk</a></p>
                <p>Atau daftar dengan</p>
                <div class="social-register">
                    <button class="btn-social google"><i class="fab fa-google"></i> Google</button>
                    <button class="btn-social facebook"><i class="fab fa-facebook-f"></i> Facebook</button>
                </div>
            </div>
        </div>
        <div class="register-image">
            <img src="../assets/img/backgrounds/register-bg.jpg" alt="Register Background">
        </div>
    </div>

    <script src="../assets/js/auth.js"></script>
</body>

</html>
