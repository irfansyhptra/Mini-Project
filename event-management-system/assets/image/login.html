<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Eventory</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/login.css">
    <link rel="stylesheet" href="../assets/libs/fontawesome/css/all.min.css">
</head>

<body>
    <div class="login-container">
        <div class="login-form-wrapper">
            <h1>Masuk</h1>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="userRole">Pilih login sebagai</label>
                    <select id="userRole" name="userRole" required>
                        <option value="" disabled selected>Pilih login sebagai</option>
                        <option value="mahasiswa">Admin</option>
                        <option value="dosen">Pengguna</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="email">Nama Pengguna</label>
                    <input type="text" id="email" name="email" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="password">Kata Sandi</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    <span class="toggle-password"><i class="far fa-eye"></i></span>
                </div>
                <a href="#" class="forgot-password">Lupa kata sandi?</a>
                <button type="submit" class="btn-login">Masuk</button>
            </form>
            <div class="login-footer">
                <p>Sudah mempunyai akun? <a href="register.html">Register here</a></p>
            </div>
        </div>
        <div class="login-image">
            <!-- You can replace this with a Christmas tree illustration similar to the reference -->
            <img src="../assets/image/bglogin.png" alt="Login Background">
        </div>
    </div>

    <script src="../assets/js/auth.js"></script>
</body>

</html>
